# Multi-CLI Review Orchestration Configuration
# See: docs-template/05-operations/deployment/multi-cli-review-orchestration.md

version: "1.0"
mode: distributed  # distributed | cross-model
parallel: true
cost_strategy: balanced  # balanced | minimize_cost | maximize_quality

# Timeout per CLI execution (seconds)
timeout: 300

# Output directory for review results
output_dir: .review-results

# ── Agent Definitions ──
agents:
  claude-code:
    command: claude
    cost_tier: premium
    default_perspectives:
      - type-design-analysis
    flags: '-p "{prompt}" --allowed-tools "Read,Grep,Glob,Bash(git diff*)"'

  codex-cli:
    command: codex
    cost_tier: standard
    default_perspectives:
      - code-review
      - error-handler-hunt
    flags: 'exec "{prompt}" --sandbox read-only'

  copilot-cli:
    command: copilot
    cost_tier: flat-rate
    default_perspectives:
      - test-analysis
      - comment-analysis
    flags: '-p "{prompt}" --silent --allow-all-tools'

  gemini-cli:
    command: gemini
    cost_tier: free-tier
    default_perspectives:
      - security-analysis
    flags: '-p "{prompt}" --sandbox --output-format text'

  cursor-cli:
    command: cursor-agent
    cost_tier: flat-rate
    default_perspectives:
      - code-simplification
    flags: '--print --model auto "{prompt}"'

# ── Graceful Degradation ──
fallback:
  claude-code: codex-cli
  codex-cli: copilot-cli
  copilot-cli: codex-cli
  gemini-cli: copilot-cli
  cursor-cli: copilot-cli

# ── pr-review-toolkit Delegation Mapping ──
toolkit_delegation:
  code-reviewer: codex-cli
  silent-failure-hunter: codex-cli
  type-design-analyzer: claude-code
  pr-test-analyzer: copilot-cli
  comment-analyzer: copilot-cli
  code-simplifier: cursor-cli
